<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANITIZOR - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <!-- Navbar -->
    <nav class="nav scrolled">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="./imgs/logo.svg" alt="SANITIZOR">
                <span>SANITIZOR</span>
            </a>
            <div class="nav-right">
                <select id="langSwitcher" class="lang-switcher">
                    <option value="en">EN</option>
                    <option value="fr">FR</option>
                    <option value="ar">AR</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Dashboard Main Area -->
    <section class="dashboard-section">
        <div class="container dashboard-container">
            <!-- Sidebar Panel -->
            <aside class="dashboard-sidebar">
                <div class="user-profile-summary">
                    <div class="avatar-circle" id="userAvatar">U</div>
                    <div class="user-details">
                        <h4 id="userNameDisplay">John Doe</h4>
                        <span id="userRoleBadge" class="role-badge" data-i18n="dash_role_patient">Patient Portal</span>
                    </div>
                </div>

                <ul class="dashboard-menu">
                    <li class="menu-item active" data-tab="appointments">
                        <svg viewBox="0 0 24 24" class="menu-icon"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z" fill="currentColor"/></svg>
                        <span data-i18n="dash_appointments">Appointments</span>
                    </li>
                    <li class="menu-item" data-tab="profile">
                        <svg viewBox="0 0 24 24" class="menu-icon"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
                        <span data-i18n="dash_profile">My Profile</span>
                    </li>
                    <li class="menu-item" data-tab="messages">
                        <svg viewBox="0 0 24 24" class="menu-icon"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/></svg>
                        <span data-i18n="dash_messages">Secure Messages</span>
                    </li>
                    <li class="menu-item" data-tab="settings">
                        <svg viewBox="0 0 24 24" class="menu-icon"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/></svg>
                        <span data-i18n="dash_settings">Settings</span>
                    </li>
                </ul>

                <button class="btn btn-outline btn-full logout-btn" id="logoutBtn" data-i18n="dash_logout">Logout</button>
            </aside>

            <!-- Main Content Viewport -->
            <main class="dashboard-content" id="mainContent">
                <!-- Welcome Title -->
                <div class="dash-header">
                    <h2><span data-i18n="dash_welcome">Welcome back</span>, <span id="welcomeName">John</span>!</h2>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Dynamic stats cards based on type -->
                </div>

                <!-- Active tab content -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3 data-i18n="dash_appointments">Appointments</h3>
                        <div id="actionArea">
                            <!-- Action button injected here -->
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="dash-table">
                            <thead>
                                <tr id="tableHeaders">
                                    <!-- Injected headers -->
                                </tr>
                            </thead>
                            <tbody id="appointmentsTableBody">
                                <!-- Injected rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p data-i18n="footer_copyright">&copy; 2025 SANITIZOR. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="translations.js"></script>
    <script>
        // Logged-in User Info Setup
        let user = JSON.parse(localStorage.getItem('sanitizor_current_user')) || {
            name: "Dr. Karim Alami",
            email: "karim@sanitizor.com",
            type: "doctor"
        };

        // Static dynamic mock data tables
        let patientAppointments = [
            { id: 1, name: "Dr. Ahmed Mansour", specialty: "spec_cardio", date: "2026-05-24 10:30", status: "Confirmed", statusClass: "badge-success" },
            { id: 2, name: "Dr. Sarah Benani", specialty: "spec_derma", date: "2026-05-12 14:00", status: "Completed", statusClass: "badge-neutral" }
        ];

        let doctorRequests = [
            { id: 1, name: "Amine Radi", specialty: "Cardiology Consultation", date: "2026-05-20 09:00", status: "Pending", statusClass: "badge-warning" },
            { id: 2, name: "Fatim-Zahra El Alami", specialty: "Post-op Follow up", date: "2026-05-21 11:30", status: "Pending", statusClass: "badge-warning" }
        ];

        // Setup User details in DOM
        function setupUserDOM() {
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('welcomeName').textContent = user.name.split(' ')[0];
            document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();

            const badge = document.getElementById('userRoleBadge');
            if (user.type === 'doctor') {
                badge.setAttribute('data-i18n', 'dash_role_doctor');
            } else {
                badge.setAttribute('data-i18n', 'dash_role_patient');
            }
        }

        // Render metrics cards
        function renderStats() {
            const statsGrid = document.getElementById('statsGrid');
            const lang = localStorage.getItem('sanitizor_lang') || 'en';

            if (user.type === 'doctor') {
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <span class="stat-num">48</span>
                        <span class="stat-lbl" data-i18n="stat_profile_views">Profile Views</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="pendingRequestsCount">2</span>
                        <span class="stat-lbl" data-i18n="stat_pending_requests">Pending Requests</span>
                    </div>
                `;
            } else {
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <span class="stat-num">2</span>
                        <span class="stat-lbl" data-i18n="stat_total_bookings">Total Appointments</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num">1</span>
                        <span class="stat-lbl" data-i18n="stat_reviews_written">Reviews Written</span>
                    </div>
                `;
            }
        }

        // Render Tab content elements
        function renderAppointments() {
            const tableHeaders = document.getElementById('tableHeaders');
            const tbody = document.getElementById('appointmentsTableBody');
            const actionArea = document.getElementById('actionArea');
            const lang = localStorage.getItem('sanitizor_lang') || 'en';

            // Translations lookup
            const colName = translations[lang]['col_name'] || 'Name';
            const colSpec = translations[lang]['col_specialty'] || 'Specialty';
            const colDate = translations[lang]['col_date'] || 'Date';
            const colStatus = translations[lang]['col_status'] || 'Status';
            const colAction = translations[lang]['col_action'] || 'Action';
            const btnFind = translations[lang]['btn_find_doctor'] || 'Search Doctors';
            const btnAccept = translations[lang]['btn_accept'] || 'Accept';
            const btnDecline = translations[lang]['btn_decline'] || 'Decline';

            if (user.type === 'doctor') {
                tableHeaders.innerHTML = `
                    <th>${colName}</th>
                    <th>${colSpec}</th>
                    <th>${colDate}</th>
                    <th>${colStatus}</th>
                    <th>${colAction}</th>
                `;

                if (doctorRequests.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No requests found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = doctorRequests.map(req => {
                    let actionsHtml = '';
                    if (req.status === 'Pending') {
                        actionsHtml = `
                            <button class="btn btn-primary btn-sm btn-accept" onclick="handleDoctorRequest(${req.id}, 'Accept')">${btnAccept}</button>
                            <button class="btn btn-outline btn-sm btn-decline" onclick="handleDoctorRequest(${req.id}, 'Decline')">${btnDecline}</button>
                        `;
                    } else {
                        actionsHtml = `<span style="font-size: 13px; font-weight: 500; color: var(--text-secondary);">N/A</span>`;
                    }

                    return `
                        <tr id="req-row-${req.id}">
                            <td><strong>${req.name}</strong></td>
                            <td>${req.specialty}</td>
                            <td>${req.date}</td>
                            <td><span class="badge ${req.statusClass}" id="req-badge-${req.id}">${req.status}</span></td>
                            <td id="req-actions-${req.id}">${actionsHtml}</td>
                        </tr>
                    `;
                }).join('');
                actionArea.innerHTML = '';
            } else {
                tableHeaders.innerHTML = `
                    <th>${colName}</th>
                    <th>${colSpec}</th>
                    <th>${colDate}</th>
                    <th>${colStatus}</th>
                `;

                tbody.innerHTML = patientAppointments.map(app => {
                    const transSpec = translations[lang][app.specialty] || app.specialty;
                    return `
                        <tr>
                            <td><strong>${app.name}</strong></td>
                            <td><span class="tag-specialty">${transSpec}</span></td>
                            <td>${app.date}</td>
                            <td><span class="badge ${app.statusClass}">${app.status}</span></td>
                        </tr>
                    `;
                }).join('');

                actionArea.innerHTML = `<a href="index.html" class="btn btn-primary btn-sm">${btnFind}</a>`;
            }
        }

        // Live request handlers
        window.handleDoctorRequest = function(id, action) {
            const badge = document.getElementById(`req-badge-${id}`);
            const actionsCell = document.getElementById(`req-actions-${id}`);
            const row = document.getElementById(`req-row-${id}`);

            if (action === 'Accept') {
                badge.className = 'badge badge-success';
                badge.textContent = 'Confirmed';
                
                // Update local array item
                const request = doctorRequests.find(r => r.id === id);
                if (request) {
                    request.status = 'Confirmed';
                    request.statusClass = 'badge-success';
                }

                actionsCell.innerHTML = `<span style="color: var(--accent); font-weight: 500; font-size:14px;">Accepted</span>`;
                
                // Decrement pending stats
                const activeCountEl = document.getElementById('pendingRequestsCount');
                if (activeCountEl) {
                    const currentNum = parseInt(activeCountEl.textContent);
                    activeCountEl.textContent = Math.max(0, currentNum - 1);
                }
            } else {
                // Fade out row animation
                row.style.opacity = '0.5';
                row.style.pointerEvents = 'none';
                setTimeout(() => {
                    doctorRequests = doctorRequests.filter(r => r.id !== id);
                    renderAppointments();
                    
                    const activeCountEl = document.getElementById('pendingRequestsCount');
                    if (activeCountEl) {
                        const currentNum = parseInt(activeCountEl.textContent);
                        activeCountEl.textContent = Math.max(0, currentNum - 1);
                    }
                }, 400);
            }
        }

        // Tab selection logic
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                menuItems.forEach(el => el.classList.remove('active'));
                item.classList.add('active');

                const tab = item.getAttribute('data-tab');
                // Tab view injection (mock tab displays)
                if (tab !== 'appointments') {
                    document.getElementById('mainContent').innerHTML = `
                        <div class="dash-header">
                            <h2>${item.querySelector('span').textContent}</h2>
                        </div>
                        <div class="dash-card">
                            <p style="color: var(--text-secondary); padding: 20px 0;">This section is secure. In a live system, dynamic forms or profiles would be managed here.</p>
                        </div>
                    `;
                } else {
                    // Restore Appointments home view
                    window.location.reload();
                }
            });
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('sanitizor_current_user');
            window.location.href = 'index.html';
        });

        // Multi-language Translation
        function setLanguage(lang) {
            localStorage.setItem('sanitizor_lang', lang);
            
            if (lang === 'ar') {
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.lang = 'ar';
                document.body.classList.add('rtl-font');
            } else {
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.lang = lang;
                document.body.classList.remove('rtl-font');
            }

            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });

            // Re-render lists to update translated strings
            renderStats();
            renderAppointments();
        }

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            setupUserDOM();
            
            const savedLang = localStorage.getItem('sanitizor_lang') || 'en';
            const langSwitcher = document.getElementById('langSwitcher');
            
            if (langSwitcher) {
                langSwitcher.value = savedLang;
                langSwitcher.addEventListener('change', (e) => {
                    setLanguage(e.target.value);
                });
            }
            
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
